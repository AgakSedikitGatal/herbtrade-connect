<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HerBlocX - Global Herbal Trading Platform</title>
    <link rel="icon" type="image/png" href="/icon.ico" />
    <meta name="description" content="Connect with verified global herbal suppliers and buyers. Trade with blockchain transparency and certified quality." />
    <meta name="author" content="HerBlocX" />

    <meta property="og:title" content="HerBlocX - Global Herbal Trading Platform" />
    <meta property="og:description" content="Connect with verified global herbal suppliers and buyers. Trade with blockchain transparency and certified quality." />
    <meta property="og:type" content="website" />
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem("herblocx-theme");
          var theme = storedTheme === "light" ? "light" : "dark";
          document.documentElement.classList.remove("light", "dark");
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
